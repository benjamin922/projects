<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rentvine - Projects Templates</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/collapse@3.x.x/dist/cdn.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            sidebar: {
              DEFAULT: '#2b2b2b',
              hover: '#363636',
              active: '#3a3a3a',
            },
            brand: {
              DEFAULT: '#00a54f',
            },
          },
        },
      },
    };
  </script>
  <style>
    [x-cloak] { display: none !important; }
    .sidebar-transition { transition: width 200ms ease-in-out, transform 200ms ease-in-out; }
    .content-transition { transition: margin-left 200ms ease-in-out; }
    aside.sidebar-transition { transform: translateX(-100%); width: 0; }
    @media (min-width: 1024px) {
      aside.sidebar-transition { transform: translateX(0); width: 232px; }
    }
  </style>
</head>
<body class="h-screen overflow-hidden bg-white text-gray-900 antialiased">
<div x-data="app()" class="flex h-screen" x-init="init()">
  <!-- ===== MOBILE BACKDROP ===== -->
  <div
    x-show="mobileOpen"
    x-transition:enter="transition-opacity ease-out duration-200"
    x-transition:enter-start="opacity-0"
    x-transition:enter-end="opacity-100"
    x-transition:leave="transition-opacity ease-in duration-150"
    x-transition:leave-start="opacity-100"
    x-transition:leave-end="opacity-0"
    class="fixed inset-0 z-40 bg-black/50 lg:hidden"
    @click="mobileOpen = false"
    x-cloak
  ></div>
  <!-- ===== SIDEBAR ===== -->
  <aside
    class="sidebar-transition fixed inset-y-0 left-0 z-50 flex flex-col bg-sidebar"
    :class="[
      'lg:z-30',
      mobileOpen ? 'w-[232px] translate-x-0' : '-translate-x-full',
      'lg:translate-x-0',
      sidebarOpen ? 'lg:w-[232px]' : 'lg:w-[56px]',
    ]"
  >
    <!-- Logo -->

      <a href="#" class="flex items-center gap-2 overflow-hidden">

          </svg>
        </template>
        <template x-if="!sidebarOpen && !mobileOpen">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 118 177" class="h-6 w-auto shrink-0">
            <path d="M59,0l53.3998,53.3998c3.5858,3.5858,5.6002,8.4491,5.6002,13.5201v51.0801l-59-59V0Z" style="fill:#00a54f;"></path>
            <path d="M59,59L5.6002,112.3998c-3.5858,3.5858-5.6002,8.4491-5.6002,13.5201v51.0801l53.3998-53.3998c3.5858-3.5858,5.6002-8.4491,5.6002-13.5201v-51.0801Z" style="fill:#00a54f;"></path>
          </svg>
        </template>
      </a>
      <button
        @click="mobileOpen = false"
        class="lg:hidden ml-auto rounded-md p-1 text-gray-400 hover:text-white transition-colors"
      >
        <i data-lucide="x" class="w-5 h-5"></i>
      </button>
    </div>
    <nav class="flex-1 overflow-y-auto overflow-x-hidden px-2 py-1 space-y-0.5">
      <template x-for="item in navItems" :key="item.label">
        <div>
          <a
            href="#"
            class="group flex items-center gap-2.5 rounded-md px-2 py-1.5 text-sm transition-colors relative"
            :class="{
              'text-white bg-sidebar-hover': isActive(item) && !item.children,
              'text-gray-400 hover:text-white hover:bg-sidebar-hover': !isActive(item) || item.children,
            }"
            @click.prevent="item.children ? toggleSection(item.label) : (setActive(item.label), closeMobileNav())"
          >
            <div
              x-show="isActive(item) && !item.children"
              class="absolute left-0 top-1 bottom-1 w-0.5 rounded-full bg-brand"
            ></div>
            <i :data-lucide="item.icon" class="w-[18px] h-[18px] shrink-0"></i>
            <span x-show="isExpanded" x-cloak class="flex-1 truncate" x-text="item.label"></span>
            <i
              x-show="item.children && isExpanded"
              x-cloak
              :data-lucide="isSectionOpen(item.label) ? 'chevron-up' : 'chevron-down'"
              class="w-4 h-4 shrink-0 text-gray-500"
            ></i>
          </a>
          <div
            x-show="item.children && isSectionOpen(item.label) && isExpanded"
            x-collapse
            x-cloak
          >
            <template x-for="child in item.children" :key="child.label">
              <a
                href="#"
                class="group flex items-center gap-2.5 rounded-md py-1.5 text-sm transition-colors relative pl-9 pr-2"
                :class="activeItem === child.label
                  ? 'text-white'
                  : 'text-gray-400 hover:text-white hover:bg-sidebar-hover'"
                @click.prevent="setActive(child.label); closeMobileNav()"
              >
                <div
                  x-show="activeItem === child.label"
                  class="absolute left-4 top-1/2 -translate-y-1/2 w-1.5 h-1.5 rounded-full bg-brand"
                ></div>
                <span class="truncate" x-text="child.label"></span>
              </a>
            </template>
          </div>
        </div>
      </template>
    </nav>
    <div class="shrink-0 border-t border-white/10 px-2 py-3">
      <div class="flex items-center gap-2.5">
        <div class="w-8 h-8 rounded-full bg-gradient-to-br from-amber-400 to-orange-500 flex items-center justify-center text-white text-xs font-semibold shrink-0">
          VV
        </div>
        <div x-show="isExpanded" x-cloak class="flex-1 min-w-0">
          <div class="text-sm text-white font-medium truncate">Vinny T. Vine</div>
          <div class="text-xs text-gray-400 truncate">ABC Homes</div>
        </div>
        <button
          x-show="isExpanded"
          x-cloak
          class="shrink-0 text-gray-400 hover:text-white transition-colors"
        >
          <i data-lucide="settings" class="w-4 h-4"></i>
        </button>
      </div>
    </div>
  </aside>
  <!-- ===== MAIN AREA ===== -->
  <div
    class="content-transition flex flex-1 flex-col min-w-0 ml-0 lg:ml-[232px]"
    :class="{ 'lg:ml-[232px]': sidebarOpen, 'lg:ml-[56px]': !sidebarOpen }"
  >
    <header class="flex h-[52px] items-center justify-between border-b border-black/[0.2] bg-white px-4 shrink-0 relative">
      <div class="flex items-center">
        <button
          @click="mobileOpen = true"
          class="lg:hidden rounded-lg p-1.5 text-gray-400 hover:text-gray-600 hover:bg-gray-100 transition-colors"
        >
          <i data-lucide="menu" class="w-5 h-5"></i>
        </button>
        <button
          @click="sidebarOpen = !sidebarOpen"
          class="hidden lg:flex rounded-lg p-1.5 text-gray-400 hover:text-gray-600 hover:bg-gray-100 transition-colors"
        >
          <i data-lucide="panel-left" class="w-4 h-4"></i>
        </button>
      </div>
      <div class="hidden sm:block absolute left-1/2 -translate-x-1/2 w-full max-w-[400px] px-4">
        <button
          class="flex items-center gap-1.5 w-full rounded-lg border border-black/[0.2] bg-white px-3 py-2 text-sm text-gray-400 hover:border-gray-300 transition-colors h-10"
        >
          <i data-lucide="search" class="w-4 h-4 shrink-0 text-gray-400"></i>
          <span class="flex-1 text-left text-gray-400">Search...</span>
          <kbd class="inline-flex items-center gap-0.5 rounded-md border border-black/[0.2] bg-white px-1.5 py-0.5 text-xs text-gray-400 font-medium">
            <span class="text-xs">&#8984;</span>K
          </kbd>
        </button>
      </div>
      <button class="sm:hidden rounded-lg p-1.5 text-gray-400 hover:text-gray-600 hover:bg-gray-100 transition-colors">
        <i data-lucide="search" class="w-5 h-5"></i>
      </button>
      <div class="flex items-center gap-3">
        <button class="relative p-1 text-gray-500 hover:text-gray-700 transition-colors">
          <i data-lucide="bell" class="w-4 h-4"></i>
          <span class="absolute -top-0.5 -right-0.5 w-1.5 h-1.5 rounded-full bg-red-500"></span>
        </button>
        <button class="w-7 h-7 rounded-full border border-gray-300/60 overflow-hidden bg-gray-200 flex items-center justify-center text-xs font-medium text-gray-600 hover:border-gray-400 transition-colors">
          <img src="https://i.pravatar.cc/28?u=vinny" alt="User" class="w-full h-full object-cover" />
        </button>
      </div>
    </header>
    <!-- ===== MAIN CONTENT AREA ===== -->
    <main class="flex-1 overflow-y-auto bg-gray-50">
      <!-- ============================================================
           PAGE CONTENT - Projects Templates
           ============================================================ -->
      <div id="content">
        <!-- Page title bar -->
        <div class="flex items-center justify-between px-4 py-2 bg-white border-b border-black/[0.2] shrink-0 gap-3">
          <h1 class="text-xl sm:text-[28px] font-semibold text-gray-900 tracking-tight leading-[34px] truncate">Projects</h1>
          <div class="flex items-center gap-2 shrink-0">
            <button class="inline-flex items-center gap-1.5 rounded-md bg-brand px-3.5 py-2 text-sm font-medium text-white hover:bg-green-600 transition-colors shadow-sm">
              <i data-lucide="plus" class="w-4 h-4"></i>
              New Template
            </button>
          </div>
        </div>

        <!-- Page content -->
        <div class="px-4 py-3 space-y-4">
          <div class="rounded-lg border border-gray-200 bg-white">
            <!-- Tabs -->
            <div class="flex items-center gap-1 px-4 pt-3 pb-0">
              <a href="#" class="inline-flex items-center px-3 py-1.5 rounded-full text-sm font-medium text-gray-500 hover:text-gray-700 hover:bg-gray-100 transition-colors">
                Projects
              </a>
              <a href="#" class="inline-flex items-center px-3 py-1.5 rounded-full text-sm font-medium bg-blue-600 text-white shadow-sm">
                Templates
              </a>
            </div>

            <!-- Toolbar: Search + Column Toggle -->
            <div class="flex items-center justify-between px-4 py-3 gap-3">
              <!-- Search -->
              <div class="relative flex-1 max-w-sm">
                <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400 pointer-events-none"></i>
                <input
                  type="text"
                  placeholder="Search Name, Description"
                  class="w-full rounded-md border border-gray-300 bg-white pl-9 pr-3 py-2 text-sm text-gray-900 placeholder-gray-400 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-colors"
                />
              </div>
              <!-- Column Toggle -->
              <button class="p-2 rounded-md text-gray-400 hover:text-gray-600 hover:bg-gray-100 transition-colors" title="Toggle columns">
                <i data-lucide="columns-3" class="w-4 h-4"></i>
              </button>
            </div>

            <!-- Table -->
            <div class="overflow-x-auto">
              <table class="w-full text-sm">
                <thead>
                  <tr class="bg-gray-50 border-y border-gray-200">
                    <th class="text-left font-medium text-gray-500 px-4 py-2.5 whitespace-nowrap">Name</th>
                    <th class="text-left font-medium text-gray-500 px-4 py-2.5 whitespace-nowrap">Description</th>
                    <th class="text-left font-medium text-gray-500 px-4 py-2.5 whitespace-nowrap">Count</th>
                  </tr>
                </thead>
                <tbody class="divide-y divide-gray-100">
                  <tr class="hover:bg-gray-50/50 transition-colors">
                    <td class="px-4 py-3 whitespace-nowrap">
                      <a href="#" class="text-blue-600 hover:text-blue-800 hover:underline font-medium">Cool Project Template</a>
                    </td>
                    <td class="px-4 py-3 text-gray-400 whitespace-nowrap">--</td>
                    <td class="px-4 py-3 text-gray-700 whitespace-nowrap">0</td>

                    <td class="px-4 py-3 whitespace-nowrap">
                      <a href="#" class="text-blue-600 hover:text-blue-800 hover:underline font-medium">Pre Move In Check</a>

                    <td class="px-4 py-3 text-gray-700 whitespace-nowrap">Pre Move in Check of Home</td>

            <!-- Pagination -->
            <div class="flex items-center justify-between px-4 py-3 border-t border-gray-200 text-sm text-gray-500">
              <div class="flex items-center gap-2">
                <span class="whitespace-nowrap">Rows per page:</span>
                <select class="rounded-md border border-gray-300 bg-white px-2 py-1 text-sm text-gray-700 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none cursor-pointer">
                  <option>15</option>
                  <option>25</option>
                  <option>50</option>
                  <option>100</option>
                </select>

                <span class="whitespace-nowrap">1-2 of 2</span>
                <div class="flex items-center gap-1">
                  <span class="whitespace-nowrap">Pages</span>
                  <select class="rounded-md border border-gray-300 bg-white px-2 py-1 text-sm text-gray-700 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none cursor-pointer">
                    <option>1</option>

              </div>

          </div>
        </div>

      <!-- ============================================================
           END PAGE CONTENT
           ============================================================ -->
    </main>
  </div>
</div>
<script>
  function app() {
    return {
      sidebarOpen: true,
      mobileOpen: false,
      navItems: [
        { label: 'Dashboard',    icon: 'layout-dashboard' },
        { label: 'Portfolios',   icon: 'folders' },
        { label: 'Property',     icon: 'building-2',       children: [{ label: 'Properties' }, { label: 'Associations' }, { label: 'Marketing' }] },
        { label: 'Screening',    icon: 'file-search',      children: [{ label: 'Dashboard' }, { label: 'Prospects' }, { label: 'Applications' }, { label: 'Payments' }, { label: 'Invitations' }] },
        { label: 'Leases',       icon: 'clipboard-list',   children: [{ label: 'Dashboard' }, { label: 'Leases' }] },
        { label: 'Rentsign',     icon: 'file-pen' },
        { label: 'Accounting',   icon: 'dollar-sign',      children: [{ label: 'Dashboard' }, { label: 'Money In' }, { label: 'Money Out' }, { label: 'Banking' }, { label: 'Transactions' }, { label: 'Diagnostics' }, { label: 'Manager' }] },
        { label: 'Contacts',     icon: 'contact',          children: [{ label: 'Owners' }, { label: 'Tenants' }, { label: 'Vendors' }, { label: 'Messages' }] },
        { label: 'Maintenance',  icon: 'wrench', open: true, children: [{ label: 'Dashboard' }, { label: 'Work Orders' }, { label: 'Projects', active: true }, { label: 'Inspections' }, { label: 'Technicians' }, { label: 'Price Book' }] },
        { label: 'Reports',      icon: 'chart-line' },
      ],
      activeItem: null,
      openSections: [],
      get isExpanded() {
        return this.sidebarOpen || this.mobileOpen;
      },
      closeMobileNav() {
        this.mobileOpen = false;
      },
      toggleSection(label) {
        const idx = this.openSections.indexOf(label);
        if (idx > -1) {
          this.openSections.splice(idx, 1);
        } else {
          this.openSections.push(label);
        }
      },
      isSectionOpen(label) {
        return this.openSections.includes(label);
      },
      setActive(label) {
        this.activeItem = label;
      },
      isActive(item) {
        if (this.activeItem === item.label) return true;
        if (item.children) {
          return item.children.some(c => c.label === this.activeItem);
        }
        return false;
      },
      init() {
        for (const item of this.navItems) {
          if (item.active) this.activeItem = item.label;
          if (item.open) this.openSections.push(item.label);
          if (item.children) {
            for (const child of item.children) {
              if (child.active) this.activeItem = child.label;
            }
          }
        }
        this.$nextTick(() => lucide.createIcons());
        this.$watch('openSections', () => {
          this.$nextTick(() => lucide.createIcons());
        });
        this.$watch('sidebarOpen', () => {
          this.$nextTick(() => lucide.createIcons());
        });
        this.$watch('mobileOpen', () => {
          this.$nextTick(() => lucide.createIcons());
        });
      },
    };
  }
</script>
</body>
